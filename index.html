<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task View</title>
    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f0f4f8;
        font-family: Arial, sans-serif;
      }
      h1 {
        font-size: 3rem;
        color: #2d3748;
      }
    </style>
    <script>
      // Guard: redirect to privacy/terms if consent has not been given
      (function () {
        var STORAGE_KEY = 'taskview_consent';
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            window.location.replace('privacy-terms.html');
          }
        } catch (e) {
          // localStorage unavailable — allow access
        }
      })();
    </script>
  </head>
  <body>
    <h1>Hello World</h1>
  </body>
</html>
