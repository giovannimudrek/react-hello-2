<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login - Acesse sua conta" />
    <title>Login - FusionApp</title>
    <style>
      /* ===========================
         CSS Custom Properties
      =========================== */
      :root {
        --color-primary: #4f46e5;
        --color-primary-hover: #4338ca;
        --color-primary-focus: rgba(79, 70, 229, 0.2);
        --color-bg: #f5f5f7;
        --color-surface: #ffffff;
        --color-text-primary: #111827;
        --color-text-secondary: #6b7280;
        --color-text-link: #4f46e5;
        --color-border: #d1d5db;
        --color-border-focus: #4f46e5;
        --color-error: #dc2626;
        --color-error-bg: #fef2f2;
        --color-error-border: #fca5a5;
        --color-success: #16a34a;
        --color-input-bg: #f9fafb;

        --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI',
          Roboto, Helvetica, Arial, sans-serif;
        --font-size-xs: 0.75rem;
        --font-size-sm: 0.875rem;
        --font-size-base: 1rem;
        --font-size-lg: 1.125rem;
        --font-size-xl: 1.25rem;
        --font-size-2xl: 1.5rem;
        --font-size-3xl: 1.875rem;

        --radius-sm: 0.375rem;
        --radius-md: 0.5rem;
        --radius-lg: 0.75rem;
        --radius-xl: 1rem;

        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.08);

        --transition: 150ms ease-in-out;
      }

      /* ===========================
         Reset & Base
      =========================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px;
        -webkit-text-size-adjust: 100%;
      }

      body {
        font-family: var(--font-family);
        font-size: var(--font-size-base);
        color: var(--color-text-primary);
        background-color: var(--color-bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        line-height: 1.5;
      }

      a {
        color: var(--color-text-link);
        text-decoration: none;
        transition: color var(--transition);
      }

      a:hover {
        color: var(--color-primary-hover);
        text-decoration: underline;
      }

      a:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
        border-radius: 2px;
      }

      img,
      svg {
        display: block;
      }

      button {
        cursor: pointer;
        font-family: var(--font-family);
      }

      /* ===========================
         Layout
      =========================== */
      .login-page {
        width: 100%;
        max-width: 440px;
      }

      /* ===========================
         Brand / Logo Area
      =========================== */
      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 2rem;
        text-align: center;
      }

      .brand__logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 52px;
        height: 52px;
        background: var(--color-primary);
        border-radius: var(--radius-lg);
        margin-bottom: 0.875rem;
        box-shadow: var(--shadow-md);
      }

      .brand__logo svg {
        width: 28px;
        height: 28px;
        fill: #ffffff;
      }

      .brand__name {
        font-size: var(--font-size-2xl);
        font-weight: 700;
        color: var(--color-text-primary);
        letter-spacing: -0.025em;
      }

      .brand__tagline {
        font-size: var(--font-size-sm);
        color: var(--color-text-secondary);
        margin-top: 0.25rem;
      }

      /* ===========================
         Card
      =========================== */
      .login-card {
        background: var(--color-surface);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-card);
        padding: 2.5rem;
        border: 1px solid rgba(0, 0, 0, 0.04);
      }

      .login-card__header {
        margin-bottom: 1.75rem;
      }

      .login-card__title {
        font-size: var(--font-size-xl);
        font-weight: 700;
        color: var(--color-text-primary);
        letter-spacing: -0.02em;
      }

      .login-card__subtitle {
        font-size: var(--font-size-sm);
        color: var(--color-text-secondary);
        margin-top: 0.375rem;
      }

      /* ===========================
         Alert (error global)
      =========================== */
      .alert {
        display: flex;
        align-items: flex-start;
        gap: 0.625rem;
        padding: 0.875rem 1rem;
        border-radius: var(--radius-md);
        font-size: var(--font-size-sm);
        margin-bottom: 1.25rem;
        line-height: 1.4;
      }

      .alert--error {
        background-color: var(--color-error-bg);
        border: 1px solid var(--color-error-border);
        color: var(--color-error);
      }

      .alert--hidden {
        display: none;
      }

      .alert__icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        margin-top: 1px;
      }

      /* ===========================
         Form
      =========================== */
      .login-form {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      /* ===========================
         Form Group
      =========================== */
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.375rem;
      }

      .form-label {
        font-size: var(--font-size-sm);
        font-weight: 500;
        color: var(--color-text-primary);
      }

      .form-label__required {
        color: var(--color-error);
        margin-left: 2px;
      }

      /* ===========================
         Input Wrapper (for icon/toggle)
      =========================== */
      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-wrapper__icon {
        position: absolute;
        left: 0.875rem;
        pointer-events: none;
        color: var(--color-text-secondary);
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      /* ===========================
         Input
      =========================== */
      .form-input {
        width: 100%;
        height: 2.75rem;
        padding: 0 2.75rem 0 2.75rem;
        background-color: var(--color-input-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        font-size: var(--font-size-base);
        font-family: var(--font-family);
        color: var(--color-text-primary);
        transition: border-color var(--transition), box-shadow var(--transition),
          background-color var(--transition);
        outline: none;
        appearance: none;
      }

      .form-input::placeholder {
        color: #9ca3af;
      }

      .form-input:hover:not(:disabled) {
        border-color: #9ca3af;
      }

      .form-input:focus {
        border-color: var(--color-border-focus);
        box-shadow: 0 0 0 3px var(--color-primary-focus);
        background-color: var(--color-surface);
      }

      .form-input--error {
        border-color: var(--color-error);
        background-color: var(--color-error-bg);
      }

      .form-input--error:focus {
        border-color: var(--color-error);
        box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
      }

      .form-input:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ===========================
         Password Toggle Button
      =========================== */
      .btn-toggle-password {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 2.75rem;
        background: none;
        border: none;
        color: var(--color-text-secondary);
        padding: 0;
        transition: color var(--transition);
        border-radius: 0 var(--radius-md) var(--radius-md) 0;
      }

      .btn-toggle-password:hover {
        color: var(--color-text-primary);
      }

      .btn-toggle-password:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: -2px;
        border-radius: var(--radius-md);
      }

      .btn-toggle-password svg {
        width: 18px;
        height: 18px;
        pointer-events: none;
      }

      /* ===========================
         Field Error Message
      =========================== */
      .field-error {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        font-size: var(--font-size-xs);
        color: var(--color-error);
        font-weight: 500;
        min-height: 1rem;
      }

      .field-error svg {
        width: 12px;
        height: 12px;
        flex-shrink: 0;
      }

      .field-error--hidden {
        display: none;
      }

      /* ===========================
         Row (remember + forgot)
      =========================== */
      .form-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      /* ===========================
         Checkbox
      =========================== */
      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        font-size: var(--font-size-sm);
        color: var(--color-text-secondary);
        user-select: none;
      }

      .checkbox-label input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 1rem;
        height: 1rem;
        border: 1.5px solid var(--color-border);
        border-radius: 0.25rem;
        background-color: var(--color-surface);
        cursor: pointer;
        flex-shrink: 0;
        transition: border-color var(--transition), background-color var(--transition),
          box-shadow var(--transition);
        display: grid;
        place-items: center;
      }

      .checkbox-label input[type="checkbox"]::before {
        content: '';
        width: 0.5rem;
        height: 0.5rem;
        clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        transform: scale(0);
        background-color: #ffffff;
        transition: transform 100ms ease-in-out;
      }

      .checkbox-label input[type="checkbox"]:checked {
        background-color: var(--color-primary);
        border-color: var(--color-primary);
      }

      .checkbox-label input[type="checkbox"]:checked::before {
        transform: scale(1);
      }

      .checkbox-label input[type="checkbox"]:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
        box-shadow: 0 0 0 3px var(--color-primary-focus);
      }

      .checkbox-label:hover input[type="checkbox"]:not(:checked) {
        border-color: #9ca3af;
      }

      /* ===========================
         Forgot Password Link
      =========================== */
      .link-forgot {
        font-size: var(--font-size-sm);
        font-weight: 500;
        white-space: nowrap;
      }

      /* ===========================
         Submit Button
      =========================== */
      .btn-primary {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        width: 100%;
        height: 2.875rem;
        padding: 0 1.5rem;
        background-color: var(--color-primary);
        color: #ffffff;
        border: none;
        border-radius: var(--radius-md);
        font-size: var(--font-size-base);
        font-weight: 600;
        letter-spacing: 0.01em;
        transition: background-color var(--transition), box-shadow var(--transition),
          transform var(--transition);
        outline: none;
      }

      .btn-primary:hover:not(:disabled) {
        background-color: var(--color-primary-hover);
        box-shadow: var(--shadow-md);
      }

      .btn-primary:active:not(:disabled) {
        transform: translateY(1px);
        box-shadow: var(--shadow-sm);
      }

      .btn-primary:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 3px;
        box-shadow: 0 0 0 4px var(--color-primary-focus);
      }

      .btn-primary:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .btn-primary__spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: none;
      }

      .btn-primary--loading .btn-primary__spinner {
        display: block;
      }

      .btn-primary--loading .btn-primary__label {
        display: none;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* ===========================
         Divider
      =========================== */
      .divider {
        display: flex;
        align-items: center;
        gap: 0.875rem;
        color: var(--color-text-secondary);
        font-size: var(--font-size-xs);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background-color: var(--color-border);
      }

      /* ===========================
         Sign Up CTA
      =========================== */
      .signup-cta {
        text-align: center;
        font-size: var(--font-size-sm);
        color: var(--color-text-secondary);
      }

      .signup-cta a {
        font-weight: 600;
      }

      /* ===========================
         Footer
      =========================== */
      .login-footer {
        margin-top: 1.5rem;
        text-align: center;
        font-size: var(--font-size-xs);
        color: var(--color-text-secondary);
      }

      .login-footer a {
        color: var(--color-text-secondary);
        text-decoration: underline;
      }

      .login-footer a:hover {
        color: var(--color-text-primary);
      }

      /* ===========================
         Responsive
      =========================== */
      @media (max-width: 480px) {
        body {
          padding: 1rem;
          align-items: flex-start;
          padding-top: 2.5rem;
        }

        .login-card {
          padding: 1.75rem 1.25rem;
        }

        .form-row {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.625rem;
        }
      }

      /* ===========================
         Reduced motion
      =========================== */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="login-page" role="main">

      <!-- Brand -->
      <header class="brand">
        <div class="brand__logo" aria-hidden="true">
          <!-- Lightning bolt icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M13 2L4.09 12.96A1 1 0 0 0 5 14.5h6.5l-1 7.5L19.91 11A1 1 0 0 0 19 9.5h-6.5L13 2z"/>
          </svg>
        </div>
        <span class="brand__name">FusionApp</span>
        <span class="brand__tagline">Plataforma de gestao de projetos</span>
      </header>

      <!-- Card -->
      <section class="login-card" aria-label="Formulario de login">

        <div class="login-card__header">
          <h1 class="login-card__title">Bem-vindo de volta</h1>
          <p class="login-card__subtitle">Insira suas credenciais para acessar sua conta.</p>
        </div>

        <!-- Global error alert -->
        <div
          class="alert alert--error alert--hidden"
          id="alert-error"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <svg class="alert__icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2z" clip-rule="evenodd"/>
          </svg>
          <span id="alert-error-text">Email ou senha invalidos. Tente novamente.</span>
        </div>

        <!-- Form -->
        <form class="login-form" id="login-form" novalidate>

          <!-- Email -->
          <div class="form-group" id="group-email">
            <label class="form-label" for="email">
              Email <span class="form-label__required" aria-hidden="true">*</span>
            </label>
            <div class="input-wrapper">
              <svg class="input-wrapper__icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M3 4a2 2 0 0 0-2 2v1.161l8.441 4.221a1.25 1.25 0 0 0 1.118 0L19 7.162V6a2 2 0 0 0-2-2H3z"/>
                <path d="m19 8.839-7.77 3.885a2.75 2.75 0 0 1-2.46 0L1 8.839V14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.839z"/>
              </svg>
              <input
                class="form-input"
                type="email"
                id="email"
                name="email"
                autocomplete="email"
                placeholder="voce@exemplo.com"
                aria-required="true"
                aria-describedby="email-error"
              />
            </div>
            <span
              class="field-error field-error--hidden"
              id="email-error"
              role="alert"
              aria-live="polite"
            >
              <svg viewBox="0 0 12 12" fill="currentColor" aria-hidden="true">
                <path d="M6 1a5 5 0 1 0 0 10A5 5 0 0 0 6 1zm.75 7.25a.75.75 0 0 1-1.5 0v-.5a.75.75 0 0 1 1.5 0v.5zm0-3a.75.75 0 0 1-1.5 0V3.75a.75.75 0 0 1 1.5 0v1.5z"/>
              </svg>
              <span id="email-error-text"></span>
            </span>
          </div>

          <!-- Password -->
          <div class="form-group" id="group-password">
            <label class="form-label" for="password">
              Senha <span class="form-label__required" aria-hidden="true">*</span>
            </label>
            <div class="input-wrapper">
              <svg class="input-wrapper__icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M10 1a4.5 4.5 0 0 0-4.5 4.5V9H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-.5V5.5A4.5 4.5 0 0 0 10 1zm3 8V5.5a3 3 0 1 0-6 0V9h6zm-5 4a1 1 0 1 1 2 0v1.5a1 1 0 1 1-2 0V13z" clip-rule="evenodd"/>
              </svg>
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                placeholder="Sua senha"
                aria-required="true"
                aria-describedby="password-error"
              />
              <button
                class="btn-toggle-password"
                type="button"
                id="btn-toggle-password"
                aria-label="Mostrar senha"
                aria-pressed="false"
              >
                <!-- Eye icon (show) -->
                <svg id="icon-eye-show" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/>
                  <path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 0 1 0-1.186A10.004 10.004 0 0 1 10 3c4.257 0 7.893 2.66 9.336 6.41.147.381.146.804 0 1.186A10.004 10.004 0 0 1 10 17c-4.257 0-7.893-2.66-9.336-6.41zM14 10a4 4 0 1 1-8 0 4 4 0 0 1 8 0z" clip-rule="evenodd"/>
                </svg>
                <!-- Eye-slash icon (hide) -->
                <svg id="icon-eye-hide" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" style="display:none">
                  <path fill-rule="evenodd" d="M3.28 2.22a.75.75 0 0 0-1.06 1.06l14.5 14.5a.75.75 0 1 0 1.06-1.06l-1.745-1.745a10.029 10.029 0 0 0 3.3-4.38 1.651 1.651 0 0 0 0-1.185A10.004 10.004 0 0 0 9.999 3a9.956 9.956 0 0 0-4.744 1.194L3.28 2.22zM7.752 6.69l1.092 1.092a2.5 2.5 0 0 1 3.374 3.373l1.091 1.092a4 4 0 0 0-5.557-5.557z" clip-rule="evenodd"/>
                  <path d="M10.748 13.93l2.523 2.523a9.987 9.987 0 0 1-3.27.547c-4.258 0-7.894-2.66-9.337-6.41a1.651 1.651 0 0 1 0-1.186A10.007 10.007 0 0 1 2.839 6.02L6.07 9.252a4 4 0 0 0 4.678 4.678z"/>
                </svg>
              </button>
            </div>
            <span
              class="field-error field-error--hidden"
              id="password-error"
              role="alert"
              aria-live="polite"
            >
              <svg viewBox="0 0 12 12" fill="currentColor" aria-hidden="true">
                <path d="M6 1a5 5 0 1 0 0 10A5 5 0 0 0 6 1zm.75 7.25a.75.75 0 0 1-1.5 0v-.5a.75.75 0 0 1 1.5 0v.5zm0-3a.75.75 0 0 1-1.5 0V3.75a.75.75 0 0 1 1.5 0v1.5z"/>
              </svg>
              <span id="password-error-text"></span>
            </span>
          </div>

          <!-- Remember me + Forgot password -->
          <div class="form-row">
            <label class="checkbox-label">
              <input
                type="checkbox"
                id="remember-me"
                name="remember"
              />
              Lembrar de mim
            </label>
            <a class="link-forgot" href="#" aria-label="Esqueci minha senha">
              Esqueceu a senha?
            </a>
          </div>

          <!-- Submit -->
          <button
            class="btn-primary"
            type="submit"
            id="btn-submit"
          >
            <span class="btn-primary__spinner" aria-hidden="true"></span>
            <span class="btn-primary__label">Entrar</span>
          </button>

        </form>

        <!-- Divider -->
        <div class="divider" role="separator" aria-hidden="true">ou</div>

        <!-- Sign up link -->
        <p class="signup-cta">
          Nao tem uma conta?
          <a href="#" aria-label="Criar nova conta">Criar conta gratis</a>
        </p>

      </section>

      <!-- Footer -->
      <footer class="login-footer">
        <p>
          Ao entrar, voce concorda com os
          <a href="#">Termos de Uso</a>
          e a
          <a href="#">Politica de Privacidade</a>.
        </p>
      </footer>

    </main>

    <script>
      (function () {
        'use strict';

        /* ---- Elements ---- */
        var form = document.getElementById('login-form');
        var emailInput = document.getElementById('email');
        var passwordInput = document.getElementById('password');
        var btnToggle = document.getElementById('btn-toggle-password');
        var iconShow = document.getElementById('icon-eye-show');
        var iconHide = document.getElementById('icon-eye-hide');
        var btnSubmit = document.getElementById('btn-submit');
        var alertError = document.getElementById('alert-error');
        var alertErrorText = document.getElementById('alert-error-text');

        /* ---- Password toggle ---- */
        btnToggle.addEventListener('click', function () {
          var isPassword = passwordInput.type === 'password';
          passwordInput.type = isPassword ? 'text' : 'password';
          btnToggle.setAttribute('aria-pressed', String(isPassword));
          btnToggle.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');
          iconShow.style.display = isPassword ? 'none' : '';
          iconHide.style.display = isPassword ? '' : 'none';
        });

        /* ---- Validation helpers ---- */
        function showFieldError(inputEl, errorId, errorTextId, message) {
          var errorEl = document.getElementById(errorId);
          var errorTextEl = document.getElementById(errorTextId);
          inputEl.classList.add('form-input--error');
          inputEl.setAttribute('aria-invalid', 'true');
          errorEl.classList.remove('field-error--hidden');
          errorTextEl.textContent = message;
        }

        function clearFieldError(inputEl, errorId) {
          var errorEl = document.getElementById(errorId);
          inputEl.classList.remove('form-input--error');
          inputEl.removeAttribute('aria-invalid');
          errorEl.classList.add('field-error--hidden');
        }

        function isValidEmail(value) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value.trim());
        }

        function validateEmail() {
          var value = emailInput.value.trim();
          if (!value) {
            showFieldError(emailInput, 'email-error', 'email-error-text', 'O email e obrigatorio.');
            return false;
          }
          if (!isValidEmail(value)) {
            showFieldError(emailInput, 'email-error', 'email-error-text', 'Insira um email valido.');
            return false;
          }
          clearFieldError(emailInput, 'email-error');
          return true;
        }

        function validatePassword() {
          var value = passwordInput.value;
          if (!value) {
            showFieldError(passwordInput, 'password-error', 'password-error-text', 'A senha e obrigatoria.');
            return false;
          }
          if (value.length < 6) {
            showFieldError(passwordInput, 'password-error', 'password-error-text', 'A senha deve ter pelo menos 6 caracteres.');
            return false;
          }
          clearFieldError(passwordInput, 'password-error');
          return true;
        }

        /* ---- Inline validation on blur ---- */
        emailInput.addEventListener('blur', validateEmail);
        passwordInput.addEventListener('blur', validatePassword);

        /* Clear errors on input */
        emailInput.addEventListener('input', function () {
          if (emailInput.classList.contains('form-input--error')) {
            validateEmail();
          }
        });

        passwordInput.addEventListener('input', function () {
          if (passwordInput.classList.contains('form-input--error')) {
            validatePassword();
          }
        });

        /* ---- Form submit ---- */
        form.addEventListener('submit', function (e) {
          e.preventDefault();

          /* Hide global alert */
          alertError.classList.add('alert--hidden');

          var emailOk = validateEmail();
          var passOk = validatePassword();

          if (!emailOk) {
            emailInput.focus();
            return;
          }
          if (!passOk) {
            passwordInput.focus();
            return;
          }

          /* Simulate loading state */
          btnSubmit.disabled = true;
          btnSubmit.classList.add('btn-primary--loading');

          /* Simulate async login (1.5s) */
          setTimeout(function () {
            btnSubmit.disabled = false;
            btnSubmit.classList.remove('btn-primary--loading');

            /* Simulate auth error for demo */
            alertError.classList.remove('alert--hidden');
            alertErrorText.textContent = 'Email ou senha invalidos. Verifique suas credenciais e tente novamente.';
            emailInput.focus();
          }, 1500);
        });
      })();
    </script>

  </body>
</html>
